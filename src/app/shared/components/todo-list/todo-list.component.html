<mat-card>
    <mat-card-title>
        Todo List
    </mat-card-title>
    <mat-card-content *ngIf="getTodosArr.length > 0; else : noTodos">
        <ul class="list-group">
            <li class="list-group-item d-flex justify-content-between align-items-center" 
            *ngFor="let todo of getTodosArr; trackBy: trackByTodosID">
                <strong>{{todo.todoItem}}</strong>
                <div>
                    <button class="mr-2" mat-mini-fab color="primary">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-mini-fab color="warn">
                        <mat-icon>delete</mat-icon>
                    </button>
                </div>
            </li>
        </ul>
    </mat-card-content>
    <ng-template #noTodos>
        <p class="alert alert-danger">No Todos Added Yet!!</p>
    </ng-template>
</mat-card>
